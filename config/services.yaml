parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'


    # Force le listener Doctrine à être enregistré
    App\EventListener\ContactSentAtListener:
        tags:
            - { name: doctrine.event_listener, event: prePersist }

    App\Command\CreateAdminCommand:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Command\DeleteTestUserCommand:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Command\ResetUsersCommand:
        arguments:
            $appEnv: '%kernel.environment%'