# config/services_test.yaml

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true   # En test, on autorise l'accès aux services

    #
    # Password Hasher accessible dans les tests
    #
    Symfony\Component\PasswordHasher\Hasher\UserPasswordHasherInterface:
        alias: 'security.user_password_hasher'

    #
    # Fixtures accessibles dans les tests
    #
    App\DataFixtures\:
        resource: '../src/DataFixtures/'
        autowire: true
        autoconfigure: true

    #
    # Mailer en test (optionnel mais recommandé)
    # Permet d’éviter les vrais envois SMTP
    #
    Symfony\Component\Mailer\MailerInterface:
        alias: 'mailer.mailer'